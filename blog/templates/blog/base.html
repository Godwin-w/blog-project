           /* ========================================
   CSS VARIABLES & RESET
   ======================================== */
:root {
    --primary-color: #4a6fa5;
    --primary-dark: #3a5a8c;
    --primary-light: #6b8cae;
    --secondary-color: #6c757d;
    --success-color: #28a745;
    --danger-color: #dc3545;
    --warning-color: #ffc107;
    --info-color: #17a2b8;
    --dark-bg: #1a1a2e;
    --light-bg: #f8f9fa;
    --card-shadow: 0 10px 20px rgba(0,0,0,0.08), 0 6px 6px rgba(0,0,0,0.1);
    --glow-shadow: 0 0 20px rgba(74,111,165,0.3);
    --transition-speed: 0.3s;
    --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
}

/* Animated background particles */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 10% 20%, rgba(74,111,165,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
    animation: floatBg 20s ease-in-out infinite;
}

@keyframes floatBg {
    0%, 100% {
        transform: scale(1) translate(0, 0);
        opacity: 0.5;
    }
    50% {
        transform: scale(1.1) translate(2%, 2%);
        opacity: 0.8;
    }
}

/* ========================================
   HEADER STYLES WITH ANIMATION
   ======================================== */
header {
    background: var(--gradient-1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 1000;
    animation: slideDown 0.6s ease-out;
}

@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

header .row {
    align-items: center;
    animation: fadeIn 0.8s ease-out;
}

header h3 {
    font-weight: 700;
    letter-spacing: 1px;
    transition: all var(--transition-speed);
    position: relative;
    display: inline-block;
}

header h3:hover {
    transform: scale(1.05) rotate(-2deg);
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

header .d-flex a {
    position: relative;
    font-weight: 500;
    transition: all 0.3s ease;
    overflow: hidden;
}

header .d-flex a::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffc107, transparent);
    transition: left 0.5s ease;
}

header .d-flex a:hover::before {
    left: 100%;
}

header .d-flex a:hover {
    transform: translateY(-2px);
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* ========================================
   FOOTER STYLES
   ======================================== */
footer {
    background: var(--gradient-1);
    margin-top: auto;
    position: relative;
    overflow: hidden;
}

footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shine 3s infinite;
}

@keyframes shine {
    to {
        left: 100%;
    }
}

footer span {
    opacity: 0.8;
    transition: opacity 0.3s ease;
}

footer span:hover {
    opacity: 1;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

/* ========================================
   CARD STYLES WITH 3D EFFECT
   ======================================== */
.card {
    border: none;
    border-radius: 16px;
    overflow: hidden;
    background: white;
    box-shadow: var(--card-shadow);
    height: 100%;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(74,111,165,0.1), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    z-index: 1;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-12px) rotateX(5deg);
    box-shadow: 0 25px 35px rgba(0,0,0,0.2);
}

.card .card-body {
    padding: 1.5rem;
    position: relative;
    z-index: 2;
}

.card img {
    border-radius: 12px;
    object-fit: cover;
    width: 100%;
    height: 120px;
    transition: all 0.5s ease;
}

.card:hover img {
    transform: scale(1.1) rotate(2deg);
}

.card-title {
    font-weight: 700;
    color: var(--dark-bg);
    margin-bottom: 0.75rem;
    font-size: 1.2rem;
    transition: color 0.3s ease;
}

.card:hover .card-title {
    color: var(--primary-color);
}

/* Card loading animation */
.card {
    animation: cardFadeIn 0.6s ease-out backwards;
    animation-delay: calc(var(--card-index, 0) * 0.1s);
}

@keyframes cardFadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ========================================
   BUTTON STYLES WITH PULSE EFFECT
   ======================================== */
.btn {
    border-radius: 25px;
    padding: 0.6rem 1.8rem;
    font-weight: 600;
    transition: all 0.3s ease;
    border: none;
    position: relative;
    overflow: hidden;
    z-index: 1;
}

.btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
    z-index: -1;
}

.btn:hover::before {
    width: 300px;
    height: 300px;
}

.btn-primary {
    background: var(--gradient-1);
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(74,111,165,0.4);
}

.btn-success {
    background: linear-gradient(135deg, #28a745, #1e7e34);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 0 0 0 rgba(40,167,69,0.4);
    }
    50% {
        box-shadow: 0 0 0 10px rgba(40,167,69,0);
    }
}

.btn-warning {
    background: linear-gradient(135deg, #ffc107, #e0a800);
    color: #1a1a2e;
}

.btn-danger {
    background: linear-gradient(135deg, #dc3545, #b02a37);
}

.btn-danger:hover {
    animation: shake 0.5s ease;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

/* ========================================
   FORM STYLES WITH FOCUS ANIMATION
   ======================================== */
.form-control {
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    padding: 0.75rem 1rem;
    transition: all 0.3s ease;
    background: white;
}

.form-control:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 4px rgba(74,111,165,0.2);
    transform: scale(1.02);
    outline: none;
}

.form-control:hover {
    border-color: var(--primary-light);
    transform: translateX(5px);
}

.form-label {
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #333;
    display: inline-block;
    transition: transform 0.3s ease;
}

.form-group:hover .form-label {
    transform: translateX(5px);
    color: var(--primary-color);
}

/* ========================================
   ERROR & ALERT STYLES WITH SLIDE IN
   ======================================== */
.alert {
    border-radius: 12px;
    border: none;
    padding: 1rem;
    margin-bottom: 1rem;
    animation: slideInRight 0.5s ease-out;
    position: relative;
    overflow: hidden;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.alert::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 5px;
    height: 100%;
    animation: progressBar 5s linear forwards;
}

@keyframes progressBar {
    from {
        height: 0;
    }
    to {
        height: 100%;
    }
}

.alert-danger {
    background-color: #f8d7da;
    color: #721c24;
}

.alert-danger::before {
    background-color: var(--danger-color);
}

.alert-success {
    background-color: #d4edda;
    color: #155724;
}

.alert-success::before {
    background-color: var(--success-color);
}

.text-danger {
    font-size: 0.85rem;
    display: inline-block;
    animation: fadeIn 0.3s ease-out;
}

/* ========================================
   PAGINATION STYLES
   ======================================== */
.pagination {
    gap: 8px;
    justify-content: center;
}

.pagination .page-item {
    list-style: none;
    opacity: 0;
    animation: fadeInUp 0.5s ease-out forwards;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.pagination .page-item:nth-child(1) { animation-delay: 0.1s; }
.pagination .page-item:nth-child(2) { animation-delay: 0.2s; }
.pagination .page-item:nth-child(3) { animation-delay: 0.3s; }
.pagination .page-item:nth-child(4) { animation-delay: 0.4s; }
.pagination .page-item:nth-child(5) { animation-delay: 0.5s; }

.pagination .page-link {
    border-radius: 12px !important;
    padding: 0.6rem 1rem;
    color: var(--primary-color);
    border: 2px solid transparent;
    transition: all 0.3s ease;
    background: white;
}

.pagination .page-link:hover {
    background-color: var(--primary-color);
    color: white;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 5px 15px rgba(74,111,165,0.3);
}

.pagination .active .page-link {
    background: var(--gradient-1);
    color: white;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0%, 100% {
        box-shadow: 0 0 5px rgba(74,111,165,0.5);
    }
    50% {
        box-shadow: 0 0 20px rgba(74,111,165,0.8);
    }
}

/* ========================================
   ABOUT PAGE STYLES
   ======================================== */
.container-fluid h3 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--dark-bg);
    margin-bottom: 2rem;
    position: relative;
    display: inline-block;
    animation: fadeInLeft 0.8s ease-out;
}

@keyframes fadeInLeft {
    from {
        opacity: 0;
        transform: translateX(-50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.container-fluid h3::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 0;
    height: 4px;
    background: var(--gradient-1);
    border-radius: 2px;
    animation: expandWidth 0.8s ease-out 0.3s forwards;
}

@keyframes expandWidth {
    to {
        width: 60px;
    }
}

.d-flex.gap-3 img {
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    transition: all 0.5s ease;
    animation: zoomIn 0.6s ease-out;
}

@keyframes zoomIn {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.d-flex.gap-3 img:hover {
    transform: scale(1.05) rotate(3deg);
    filter: brightness(1.05);
}

.content {
    background: white;
    padding: 2rem;
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    line-height: 1.8;
    font-size: 1.05rem;
    animation: fadeInRight 0.6s ease-out 0.2s backwards;
}

@keyframes fadeInRight {
    from {
        opacity: 0;
        transform: translateX(50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* ========================================
   DASHBOARD SPECIFIC STYLES
   ======================================== */
.card .btn-sm {
    border-radius: 20px;
    padding: 0.3rem 1rem;
    font-size: 0.75rem;
    transition: all 0.3s ease;
}

.card .btn-sm:hover {
    transform: translateY(-2px) scale(1.05);
}

/* Delete button special effect */
.btn-danger.btn-sm {
    position: relative;
}

.btn-danger.btn-sm:active {
    animation: shake 0.3s ease;
}

/* ========================================
   DETAIL PAGE STYLES
   ======================================== */
.detail-content {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--card-shadow);
    animation: fadeInUp 0.6s ease-out;
}

.detail-content h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: textGlow 2s ease-in-out infinite;
}

@keyframes textGlow {
    0%, 100% {
        text-shadow: 0 0 5px rgba(74,111,165,0);
    }
    50% {
        text-shadow: 0 0 15px rgba(74,111,165,0.5);
    }
}

.detail-content img {
    border-radius: 16px;
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    transition: transform 0.5s ease;
    animation: fadeIn 1s ease-out;
}

.detail-content img:hover {
    transform: scale(1.02);
}

.related-posts {
    background: white;
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: var(--card-shadow);
    position: sticky;
    top: 100px;
    animation: slideInRight 0.6s ease-out;
}

.related-posts ul li {
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeInLeft 0.4s ease-out forwards;
}

@keyframes fadeInLeft {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.related-posts ul li:nth-child(1) { animation-delay: 0.1s; }
.related-posts ul li:nth-child(2) { animation-delay: 0.2s; }
.related-posts ul li:nth-child(3) { animation-delay: 0.3s; }
.related-posts ul li:nth-child(4) { animation-delay: 0.4s; }
.related-posts ul li:nth-child(5) { animation-delay: 0.5s; }

.related-posts ul li a {
    text-decoration: none;
    color: #555;
    transition: all 0.3s ease;
    display: inline-block;
}

.related-posts ul li a:hover {
    color: var(--primary-color);
    transform: translateX(10px);
}

/* ========================================
   CONTACT PAGE STYLES
   ======================================== */
.contact-form-container {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--card-shadow);
    max-width: 700px;
    margin: 0 auto;
    animation: fadeInUp 0.6s ease-out;
}

/* ========================================
   SCROLL REVEAL ANIMATION
   ======================================== */
.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* ========================================
   LOADING SPINNER
   ======================================== */
.loading-spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(74,111,165,0.2);
    border-top: 4px solid var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ========================================
   TOOLTIP ANIMATION
   ======================================== */
[data-tooltip] {
    position: relative;
    cursor: pointer;
}

[data-tooltip]:before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    pointer-events: none;
}

[data-tooltip]:hover:before {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(-15px);
}

/* ========================================
   RESPONSIVE STYLES
   ======================================== */
@media (max-width: 768px) {
    .card .row {
        flex-direction: column;
    }
    
    .card .col-md-4, .card .col-md-8 {
        width: 100%;
        text-align: center;
    }
    
    .card img {
        margin-bottom: 1rem;
        height: 180px;
    }
    
    header .row {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
    }
    
    .d-flex.gap-3 {
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .pagination {
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .pagination .page-link {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
    }
    
    .detail-content h1 {
        font-size: 1.6rem;
    }
    
    .detail-content {
        padding: 1rem;
    }
    
    @keyframes fadeInUp {
        from {
            transform: translateY(20px);
        }
    }
}

@media (max-width: 576px) {
    .card .d-flex {
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
    }
    
    .dashboard-header {
        text-align: center;
    }
    
    .contact-form-container {
        padding: 1rem;
        margin: 0 1rem;
    }
    
    .btn {
        padding: 0.5rem 1.2rem;
    }
}

/* ========================================
   CUSTOM SCROLLBAR
   ======================================== */
::-webkit-scrollbar {
    width: 12px;
}

::-webkit-scrollbar-track {
    background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: var(--gradient-1);
    border-radius: 10px;
    transition: all 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--gradient-2);
    transform: scale(1.1);
}

/* ========================================
   HOVER GLOW EFFECTS
   ======================================== */
.glow-on-hover {
    transition: all 0.3s ease;
}

.glow-on-hover:hover {
    box-shadow: var(--glow-shadow);
    filter: brightness(1.05);
}

/* ========================================
   TYPEWRITER EFFECT
   ======================================== */
.typewriter {
    overflow: hidden;
    border-right: 2px solid var(--primary-color);
    white-space: nowrap;
    animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
}

@keyframes typing {
    from {
        width: 0;
    }
    to {
        width: 100%;
    }
}

@keyframes blink-caret {
    from, to {
        border-color: transparent;
    }
    50% {
        border-color: var(--primary-color);
    }
}

/* ========================================
   BACKGROUND ANIMATION
   ======================================== */
.animated-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
}

.animated-bg span {
    position: absolute;
    display: block;
    background: rgba(74,111,165,0.05);
    border-radius: 50%;
    animation: floatUp 15s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
    }
}
    </style>
    
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body >

    {% include "blog/includes/header.html" %}

    {% block content %}
    {% endblock  %}
   


    {% include "blog/includes/footer.html" %}
    <script>
    // Scroll reveal animation
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    };
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, observerOptions);
    
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    
    // Add floating background bubbles
    function createBubbles() {
        const bg = document.createElement('div');
        bg.className = 'animated-bg';
        document.body.appendChild(bg);
        
        for(let i = 0; i < 50; i++) {
            const bubble = document.createElement('span');
            const size = Math.random() * 100 + 20;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = Math.random() * 20 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            bg.appendChild(bubble);
        }
    }
    
    createBubbles();
